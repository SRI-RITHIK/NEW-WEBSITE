<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg, #89f7fe, #66a6ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#ff4d6d;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e63950;
}

a{
color:#ff4d6d;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h2>User Login</h2>

<input id="email" type="email" placeholder="Enter Email">

<input id="password" type="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p style="margin-top:15px">
Don't have an account?  
<a href="signup.html">Create Account</a>
</p>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://nbdzyvngupwrcaosocuv.supabase.co"
const supabaseKey = "sb_publishable_awJpaCgSgcjjbR-ydrhO8A_ux1EHA9P"

const supabase = createClient(supabaseUrl, supabaseKey)

window.login = async function(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email: email,
password: password
})

if(error){
alert(error.message)
}else{
alert("Login successful")
window.location.href="index.html"
}

}

</script>

</body>

</html>
