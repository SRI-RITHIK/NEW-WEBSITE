<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
font-family:Arial;
background:black;
background-image:url("https://images.pexels.com/photos/1341279/pexels-photo-1341279.jpeg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:12px;
width:360px;
text-align:center;
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#6c63ff;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5750d4;
}

.otp-boxes{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.otp-boxes input{
width:45px;
height:50px;
text-align:center;
font-size:20px;
border-radius:6px;
border:none;
}

.links{
margin-top:10px;
font-size:14px;
}

.links a{
color:#9ecbff;
text-decoration:none;
}

hr{
margin:20px 0;
border:1px solid #333;
}

</style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<input id="email" type="email" placeholder="Enter Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login with Password</button>

<hr>

<h3>Login with OTP</h3>

<button onclick="sendOTP()">Send OTP</button>

<div class="otp-boxes">
<input maxlength="1" class="otp">
<input maxlength="1" class="otp">
<input maxlength="1" class="otp">
<input maxlength="1" class="otp">
<input maxlength="1" class="otp">
<input maxlength="1" class="otp">
</div>

<button onclick="verifyOTP()">Verify OTP</button>

<div class="links">

<p><a href="#" onclick="resetPassword()">Forgot Password?</a></p>

<p>Don't have an account?  
<a href="signup.html">Create Account</a>
</p>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://nbdzyvngupwrcaosocuv.supabase.co",
"sb_publishable_awJpaCgSgcjjbR-ydrhO8A_ux1EHA9P"
)

window.login=async function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signInWithPassword({
email,
password
})

if(error){
alert(error.message)
}else{
window.location.href="index.html"
}

}

window.sendOTP=async function(){

const email=document.getElementById("email").value

const {error}=await supabase.auth.signInWithOtp({
email
})

if(error){
alert(error.message)
}else{
alert("OTP sent to your email")
}

}

window.verifyOTP=async function(){

const email=document.getElementById("email").value

const boxes=document.querySelectorAll(".otp")

let token=""

boxes.forEach(box=>{
token+=box.value
})

const {error}=await supabase.auth.verifyOtp({
email,
token,
type:"email"
})

if(error){
alert(error.message)
}else{
window.location.href="index.html"
}

}

window.resetPassword=async function(){

const email=document.getElementById("email").value

await supabase.auth.resetPasswordForEmail(email)

alert("Password reset email sent")

}

document.querySelectorAll(".otp").forEach((input,index,arr)=>{

input.addEventListener("input",()=>{

if(input.value && arr[index+1]){
arr[index+1].focus()
}

})

})

</script>

</body>
</html>
