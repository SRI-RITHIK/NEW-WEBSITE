<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Akshita Photo Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body class="bg-purple-50 text-gray-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-purple-200">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-20">
            <a href="index.html" class="font-serif text-2xl font-bold tracking-widest text-purple-600 flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-6 h-6"></i> Back
            </a>
            <h1 class="font-serif text-xl hidden md:block text-purple-500">
                Events
            </h1>
        </div>
    </nav>

    <!-- Heading Section -->
    <div class="pt-32 pb-12 text-center px-4">
        <h1 class="font-serif text-5xl font-bold mb-4 text-purple-600">
            Events
        </h1>

        <p class="text-gray-500 max-w-2xl mx-auto text-lg">
            From weddings and celebrations to corporate gatherings and special occasions, we capture every event with creativity, emotion, and timeless storytelling.
        </p>
    </div>

    <div class="max-w-7xl mx-auto px-4 pb-24">
        <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">

            <img src="https://images.pexels.com/photos/29329515/pexels-photo-29329515.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/33482328/pexels-photo-33482328.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/16781572/pexels-photo-16781572.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/20074791/pexels-photo-20074791.jpeg" class="w-full rounded-xl object-cover">
