<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Photoshoot | Akshita Photo Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body class="bg-purple-50 text-gray-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-purple-200">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-20">
            <a href="index.html" class="font-serif text-2xl font-bold tracking-widest text-purple-600 flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-6 h-6"></i> Back
            </a>
            <h1 class="font-serif text-xl hidden md:block text-purple-500">
                Family Photoshoot
            </h1>
        </div>
    </nav>

    <!-- Heading Section -->
    <div class="pt-32 pb-12 text-center px-4">
        <h1 class="font-serif text-5xl font-bold mb-4 text-purple-600">
            Family Photoshoot
        </h1>

        <p class="text-gray-500 max-w-2xl mx-auto text-lg">
            Capture timeless moments with your loved ones through our warm and joyful family photography sessions, designed to preserve memories that last forever.
        </p>
    </div>

    <!-- Gallery -->
    <div class="max-w-7xl mx-auto px-4 pb-24">
        <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">

            <img src="https://images.pexels.com/photos/1682497/pexels-photo-1682497.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/3204051/pexels-photo-3204051.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/2253879/pexels-photo-2253879.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/3204088/pexels-photo-3204088.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/11091836/pexels-photo-11091836.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/5637766/pexels-photo-5637766.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/6517761/pexels-photo-6517761.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/7180244/pexels-photo-7180244.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/3184183/pexels-photo-3184183.jpeg" class="w-full rounded-xl object-cover">
            <img src="https://images.pexels.com/photos/7392324/pexels-photo-7392324.jpeg" class="w-full rounded-xl object-cover">

        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
